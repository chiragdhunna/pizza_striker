name: Distribute to Testers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"          # Gradle 9.1 needs JDK 17+; 21 matches modern local

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"   # MUST match your local `flutter --version`
          cache: true 

      - run: flutter pub get

      - run: flutter build apk --release --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Distribute to Firebase testers
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "CI build ${{ github.sha }}"