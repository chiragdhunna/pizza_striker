name: pizza_striker
description: "Pizza Striker — Flutter client for the Pizza Striker backend."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking
  dio: ^5.4.0

  # State management (no code generation)
  provider: ^6.1.0

  # Local persistence
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
